<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mechanic Portal — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:      #000;
      --text:    #fff;
      --muted:   rgba(255,255,255,0.42);
      --border:  rgba(255,255,255,0.13);
      --surface: rgba(255,255,255,0.03);
      --accent:  #e8440a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    /* ── Logo ── */
    .logo-wrap {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .logo-name {
      display: block;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 5px;
    }

    .logo-tag {
      font-size: 0.58rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 360px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--surface);
      overflow: hidden;
    }

    .card-header {
      padding: 1rem 1.625rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 600;
    }

    .card-body {
      padding: 1.625rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .field label {
      display: block;
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 0.45rem;
    }

    .field input {
      width: 100%;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      padding: 0.7rem 0.875rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .field input:focus { border-color: rgba(255,255,255,0.35); }

    .login-btn {
      width: 100%;
      background: var(--text);
      border: none;
      color: var(--bg);
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.85rem;
      border-radius: 3px;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-top: 0.25rem;
    }

    .login-btn:hover { opacity: 0.85; }
    .login-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .error-msg {
      font-size: 0.75rem;
      color: var(--accent);
      text-align: center;
      min-height: 1.1rem;
      letter-spacing: 0.01em;
    }

    /* ── Footer ── */
    .footer-note {
      margin-top: 2rem;
      font-size: 0.58rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
    }
  </style>
</head>
<body>

<div class="logo-wrap">
  <span class="logo-name" id="shopNameHeader">Your Shop</span>
  <span class="logo-tag">Mechanic Portal</span>
</div>

<div class="card">
  <div class="card-header">Sign In</div>
  <div class="card-body">
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <button class="login-btn" id="loginBtn">Sign In</button>
    <div class="error-msg" id="errorMsg"></div>
  </div>
</div>

<div class="footer-note" id="footerNote">Staff Access Only</div>

<script>
  // Restore shop name from localStorage (set by mechanic after first login)
  const savedShop = localStorage.getItem('mechanic_shop_name');
  if (savedShop) {
    document.getElementById('shopNameHeader').textContent = savedShop;
    document.getElementById('footerNote').textContent = savedShop + ' · Staff Access Only';
    document.title = savedShop + ' — Login';
  }

  // If already authenticated, skip login
  if (localStorage.getItem('mechanic_session') === 'authenticated') {
    window.location.href = '/dashboard';
  }

  const btn      = document.getElementById('loginBtn');
  const pwInput  = document.getElementById('password');
  const errorMsg = document.getElementById('errorMsg');

  async function handleLogin() {
    const pw = pwInput.value.trim();
    if (!pw) { errorMsg.textContent = 'Enter your password.'; return; }

    btn.disabled    = true;
    btn.textContent = 'Signing in…';
    errorMsg.textContent = '';

    try {
      const res  = await fetch('/api/auth', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ password: pw }),
      });
      const data = await res.json();

      if (data.ok) {
        localStorage.setItem('mechanic_session', 'authenticated');
        window.location.href = '/dashboard';
      } else {
        errorMsg.textContent = data.error || 'Incorrect password.';
        btn.disabled    = false;
        btn.textContent = 'Sign In';
      }
    } catch {
      errorMsg.textContent = 'Connection error — try again.';
      btn.disabled    = false;
      btn.textContent = 'Sign In';
    }
  }

  btn.addEventListener('click', handleLogin);
  pwInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleLogin(); });
</script>
</body>
</html>
