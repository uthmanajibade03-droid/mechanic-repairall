<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pay Invoice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://js.stripe.com/v3/"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:         #000;
      --text:       #fff;
      --muted:      rgba(255,255,255,0.42);
      --border:     rgba(255,255,255,0.13);
      --surface:    rgba(255,255,255,0.03);
      --surface2:   rgba(255,255,255,0.06);
      --accent:     #e8440a;
      --accent-dim: rgba(232,68,10,0.1);
      --success:    #2dbd6e;
      --success-bg: rgba(45,189,110,0.08);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Nav ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2.5rem;
      border-bottom: 1px solid var(--border);
      background: rgba(0,0,0,0.92);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index: 100;
    }

    .nav-logo {
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: -0.01em;
      color: var(--text);
      text-decoration: none;
    }

    .nav-links { display: flex; align-items: center; gap: 1.75rem; }

    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.68rem;
      letter-spacing: 0.04em;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--text); }

    .nav-cta {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-size: 0.6rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 600;
      padding: 5px 14px;
      border-radius: 2px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
    }
    .nav-cta:hover { border-color: rgba(255,255,255,0.3); color: var(--text); }

    .logo-sub {
      font-size: 0.58rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* ── Page layout ── */
    .page-wrap {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 5rem 1.25rem 3rem;
    }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 540px;
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
    }

    /* ── Loading / error / success states ── */
    .state-screen {
      padding: 5rem 2.5rem;
      text-align: center;
    }

    .state-icon { font-size: 2.25rem; margin-bottom: 1rem; }

    .state-title {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }

    .state-desc { font-size: 0.85rem; color: var(--muted); line-height: 1.6; }

    .spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--text);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Invoice top ── */
    .invoice-top {
      padding: 1.75rem 2rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .inv-badge {
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.875rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .inv-badge::before {
      content: '';
      display: inline-block;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent);
    }

    .customer-name {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      margin-bottom: 4px;
    }

    .vehicle-info { font-size: 0.82rem; color: var(--muted); }

    /* ── Services ── */
    .services-section {
      padding: 1.25rem 2rem;
      border-bottom: 1px solid var(--border);
    }

    .section-label {
      font-size: 0.58rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 0.875rem;
    }

    .service-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.625rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.875rem;
    }
    .service-item:last-child { border-bottom: none; }
    .service-name  { color: var(--text); }
    .service-price { color: var(--muted); font-variant-numeric: tabular-nums; }

    /* ── Total row ── */
    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      background: var(--accent-dim);
      border-bottom: 1px solid rgba(232,68,10,0.15);
    }

    .total-label {
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 600;
    }

    .total-amount {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
    }

    /* ── Notes ── */
    .notes-section {
      padding: 0.875rem 2rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .notes-text { font-size: 0.82rem; color: var(--muted); line-height: 1.6; }

    /* ── Payment section ── */
    .payment-section { padding: 1.5rem 2rem 2rem; }
    .payment-section .section-label { margin-bottom: 1.25rem; }

    #payment-element { margin-bottom: 1.25rem; }

    #payment-error {
      color: var(--accent);
      font-size: 0.8rem;
      margin-bottom: 0.875rem;
      padding: 0.75rem 0.875rem;
      background: var(--accent-dim);
      border-radius: 3px;
      border: 1px solid rgba(232,68,10,0.2);
      display: none;
    }

    /* ── SMS consent ── */
    .consent-block {
      margin-bottom: 1.125rem;
      padding: 0.875rem 1rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 3px;
    }
    .consent-label {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      cursor: pointer;
      font-size: 0.75rem;
      color: var(--muted);
      line-height: 1.55;
    }
    .consent-label input[type="checkbox"] {
      margin-top: 2px;
      flex-shrink: 0;
      width: 14px; height: 14px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    /* ── Pay button ── */
    .pay-btn {
      width: 100%;
      background: var(--text);
      border: none;
      color: var(--bg);
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.95rem;
      border-radius: 3px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .pay-btn:hover { opacity: 0.85; }
    .pay-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .secure-note {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 0.875rem;
      font-size: 0.62rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* ── Success screen ── */
    .success-screen {
      padding: 4rem 2.5rem;
      text-align: center;
    }

    .success-icon {
      width: 56px; height: 56px;
      background: var(--success-bg);
      border: 1px solid rgba(45,189,110,0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 1.5rem;
    }

    .success-title {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--success);
      margin-bottom: 0.5rem;
    }

    .success-desc {
      font-size: 0.875rem;
      color: var(--muted);
      line-height: 1.6;
    }

    .success-ref {
      font-size: 0.65rem;
      color: var(--muted);
      margin-top: 1.25rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* ── Footer ── */
    footer {
      padding: 1.25rem;
      text-align: center;
      font-size: 0.58rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-top: 1px solid var(--border);
    }

    @media (max-width: 600px) {
      header { padding: 0 1.25rem; }
      .invoice-top, .services-section, .payment-section { padding-left: 1.25rem; padding-right: 1.25rem; }
      .total-row, .notes-section { padding-left: 1.25rem; padding-right: 1.25rem; }
    }
  </style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo" id="shopNameHeader">Your Shop</a>
  <div class="nav-links">
    <a href="/#tiers">Plans</a>
    <a href="/#join" class="nav-cta">Join Now</a>
  </div>
</nav>

<div class="page-wrap">
  <div class="card" id="card">
    <div class="state-screen" id="loadingScreen">
      <div class="spinner"></div>
      <div class="state-desc">Loading your invoice…</div>
    </div>
  </div>
</div>

<footer id="shopFooter">Powered by Stripe</footer>

<script>
  const STRIPE_PK = 'pk_test_51TGJM5QZfqTSZT3gkyD2USHzlNoRPtHWlnkjxzEsn83gdKBuyFZsjftGB7lnEgBhoaStyp6XreWUgPDJ1N0pPW9d00EmVEB0hU';
  const stripe    = Stripe(STRIPE_PK);

  const params          = new URLSearchParams(location.search);
  const invoiceId       = params.get('id');
  const redirectStatus  = params.get('redirect_status');
  const paymentIntentId = params.get('payment_intent');
  const card            = document.getElementById('card');

  function escapeHtml(v) {
    return String(v ?? '').replaceAll('&','&amp;').replaceAll('<','&lt;')
      .replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#39;');
  }
  function formatMoney(v) {
    return '$' + Number(v || 0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  }

  function showError(title, desc) {
    card.innerHTML = `
      <div class="state-screen">
        <div class="state-icon">⚠️</div>
        <div class="state-title">${escapeHtml(title)}</div>
        <div class="state-desc">${escapeHtml(desc)}</div>
      </div>`;
  }

  function setBranding(inv) {
    const name = inv.shop_name || 'Your Mechanic';
    document.getElementById('shopNameHeader').textContent = name;
    document.title = name + ' — Pay Invoice';
    document.getElementById('shopFooter').textContent =
      `Powered by Stripe | ${name} © ${new Date().getFullYear()}`;
  }

  function showPaidScreen(inv) {
    const shopName = inv.shop_name || 'Your Mechanic';
    card.innerHTML = `
      <div class="success-screen">
        <div class="success-icon">✓</div>
        <div class="success-title">Payment Received</div>
        <div class="success-desc">Thank you, ${escapeHtml(inv.customer_name)}!<br>Your payment has been processed successfully.</div>
        <div class="success-ref">${escapeHtml(inv.invoice_id)} · ${escapeHtml(shopName)}</div>
      </div>`;
  }

  async function updateInvoice(recordId, fields) {
    await fetch('/api/update-invoice', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ record_id: recordId, fields }),
    });
  }

  if (!invoiceId) {
    showError('No Invoice', 'No invoice ID was provided in this link.');
  } else {
    loadInvoice();
  }

  async function loadInvoice() {
    // Step 1: Fetch invoice data via Netlify Function (API key stays server-side)
    let inv, recordId;

    try {
      const res  = await fetch(`/api/get-invoice?id=${encodeURIComponent(invoiceId)}`);
      const data = await res.json();

      if (!res.ok || data.error) {
        showError('Invoice Not Found', data.error || 'This link is invalid or has expired.');
        return;
      }

      inv      = data.invoice;
      recordId = inv._recordId;
    } catch {
      showError('Connection Error', 'Could not reach the server. Please try again.');
      return;
    }

    // Update header branding with shop name
    setBranding(inv);

    // Step 2: Handle Stripe redirect return (payment already confirmed)
    if (redirectStatus === 'succeeded' && paymentIntentId) {
      await updateInvoice(recordId, {
        status:                 'paid',
        stripe_payment_intent:  paymentIntentId,
      });
      showPaidScreen(inv);
      return;
    }

    // Step 3: Already paid?
    if (inv.status === 'paid') {
      card.innerHTML = `
        <div class="success-screen">
          <div class="success-icon">✓</div>
          <div class="success-title">Already Paid</div>
          <div class="success-desc">This invoice has already been paid.<br>Thank you for your business!</div>
          <div class="success-ref">${escapeHtml(inv.invoice_id)}</div>
        </div>`;
      return;
    }

    // Step 4: Render invoice and payment form
    const shopName = inv.shop_name || 'Your Mechanic';
    let services = [];
    try { services = JSON.parse(inv.services); } catch {}

    card.innerHTML = `
      <div class="invoice-top">
        <div class="inv-badge">${escapeHtml(inv.invoice_id)}</div>
        <div class="customer-name">${escapeHtml(inv.customer_name)}</div>
        ${inv.vehicle ? `<div class="vehicle-info">${escapeHtml(inv.vehicle)}</div>` : ''}
      </div>

      <div class="services-section">
        <div class="section-label">Services</div>
        ${services.map(s => `
          <div class="service-item">
            <span class="service-name">${escapeHtml(s.name)}</span>
            <span class="service-price">${formatMoney(s.price)}</span>
          </div>`).join('')}
      </div>

      <div class="total-row">
        <span class="total-label">Total Due</span>
        <span class="total-amount">${formatMoney(inv.total_amount)}</span>
      </div>

      ${inv.notes ? `
      <div class="notes-section">
        <div class="section-label">Notes</div>
        <div class="notes-text">${escapeHtml(inv.notes)}</div>
      </div>` : ''}

      <div class="payment-section">
        <div class="section-label">Payment Details</div>
        <div id="payment-element"></div>
        <div id="payment-error"></div>
        <div class="consent-block">
          <label class="consent-label">
            <input type="checkbox" id="smsConsent" />
            <span>I agree to receive text message updates about this invoice from ${escapeHtml(shopName)}. Msg &amp; data rates may apply.</span>
          </label>
        </div>
        <button class="pay-btn" id="payBtn">Pay ${formatMoney(inv.total_amount)}</button>
        <div class="secure-note">🔒 Secured by Stripe</div>
      </div>`;

    // Step 5: Create Stripe PaymentIntent via Netlify Function
    try {
      const res  = await fetch('/api/create-payment-intent', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ invoice_id: invoiceId }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Payment setup failed');

      const elements = stripe.elements({
        clientSecret: data.clientSecret,
        appearance: {
          theme: 'night',
          variables: {
            colorPrimary:     '#e8440a',
            colorBackground:  '#0a0a0a',
            colorText:        '#ffffff',
            colorDanger:      '#e8440a',
            fontFamily:       'Inter, sans-serif',
            borderRadius:     '3px',
          },
          rules: {
            '.Input': { border: '1px solid rgba(255,255,255,0.13)', backgroundColor: 'transparent' },
            '.Input:focus': { border: '1px solid rgba(255,255,255,0.35)', outline: 'none', boxShadow: 'none' },
          },
        },
      });

      const paymentElement = elements.create('payment');
      paymentElement.mount('#payment-element');

      // Step 6: Handle pay button click
      document.getElementById('payBtn').addEventListener('click', async () => {
        const btn        = document.getElementById('payBtn');
        const errEl      = document.getElementById('payment-error');
        const consentBox = document.getElementById('smsConsent');

        // Require SMS consent
        if (!consentBox.checked) {
          errEl.textContent    = 'Please agree to receive text updates before paying.';
          errEl.style.display  = 'block';
          return;
        }

        btn.disabled    = true;
        btn.textContent = 'Processing…';
        errEl.style.display = 'none';

        // Save SMS consent before payment redirect
        await updateInvoice(recordId, {
          sms_consent:    true,
          sms_consent_at: new Date().toISOString(),
        });

        const { error } = await stripe.confirmPayment({
          elements,
          confirmParams: {
            return_url: `${location.origin}${location.pathname}?id=${encodeURIComponent(invoiceId)}`,
          },
        });

        if (error) {
          errEl.textContent   = error.message || 'Payment failed.';
          errEl.style.display = 'block';
          btn.disabled        = false;
          btn.textContent     = `Pay ${formatMoney(inv.total_amount)}`;
        }
      });

    } catch (e) {
      const el = document.getElementById('payment-element');
      if (el) {
        el.innerHTML = `
          <div style="padding:1rem;border:1px dashed var(--border);border-radius:3px;font-size:0.78rem;color:var(--muted);line-height:1.8;">
            ⚠️ Payment unavailable — could not connect to payment processor.<br>
            Please contact ${escapeHtml(shopName)} directly.
          </div>`;
      }
      console.error('Payment setup error:', e);
    }
  }
</script>
</body>
</html>
