<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RepairAll Auto LLC - Pay Invoice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://js.stripe.com/v3/"></script>
  <style>
    :root {
      --bg: #f5f0e8;
      --surface: #ffffff;
      --surface2: #f9f6f0;
      --border: #e0d8cc;
      --accent: #e8440a;
      --accent-dim: rgba(232, 68, 10, 0.08);
      --text: #1a1510;
      --muted: #9a9088;
      --success: #1e9e5a;
      --success-bg: #f0faf5;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 18px 40px;
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(245,240,232,0.9);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo-main {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 24px;
      letter-spacing: 2px;
      color: var(--text);
    }

    .logo-sep { color: var(--border); }

    .logo-sub {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .page-wrap {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 48px 20px;
      position: relative;
      z-index: 1;
    }

    .card {
      width: 100%;
      max-width: 560px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 4px 40px rgba(0,0,0,0.06);
    }

    .state-screen {
      padding: 80px 40px;
      text-align: center;
    }

    .state-icon { font-size: 40px; margin-bottom: 16px; }

    .state-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }

    .state-desc {
      color: var(--muted);
      font-size: 14px;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .invoice-top {
      padding: 32px 36px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }

    .inv-badge {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .inv-badge::before {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
    }

    .customer-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      letter-spacing: 2px;
      color: var(--text);
      margin-bottom: 4px;
    }

    .vehicle-info {
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.5px;
    }

    .services-section {
      padding: 24px 36px;
      border-bottom: 1px solid var(--border);
    }

    .section-label {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .service-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }

    .service-item:last-child { border-bottom: none; }

    .service-name { color: var(--text); }
    .service-price {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--text);
    }

    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 36px;
      background: var(--accent-dim);
      border-bottom: 1px solid rgba(232,68,10,0.15);
    }

    .total-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
    }

    .total-amount {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 38px;
      color: var(--accent);
      letter-spacing: 2px;
    }

    .notes-section {
      padding: 16px 36px;
      border-bottom: 1px solid var(--border);
    }

    .notes-text {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
    }

    .payment-section {
      padding: 28px 36px 36px;
    }

    .payment-section .section-label { margin-bottom: 20px; }

    #payment-element {
      margin-bottom: 20px;
    }

    .pay-btn {
      width: 100%;
      background: var(--accent);
      border: none;
      color: #fff;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: 3px;
      padding: 16px;
      border-radius: 3px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .pay-btn:hover { background: #d03a08; }
    .pay-btn:active { transform: scale(0.99); }
    .pay-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .secure-note {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 14px;
      font-size: 11px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      letter-spacing: 1px;
    }

    #payment-error {
      color: #c0392b;
      font-size: 13px;
      margin-top: 12px;
      padding: 10px 14px;
      background: #fdf2f0;
      border-radius: 3px;
      border: 1px solid #f0c0b8;
      display: none;
    }

    .success-screen {
      padding: 60px 36px;
      text-align: center;
    }

    .success-icon {
      width: 64px;
      height: 64px;
      background: var(--success-bg);
      border: 2px solid var(--success);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 28px;
    }

    .success-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      letter-spacing: 2px;
      color: var(--success);
      margin-bottom: 8px;
    }

    .success-desc {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
    }

    .success-ref {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      margin-top: 20px;
      letter-spacing: 1px;
    }

    footer {
      padding: 20px;
      text-align: center;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    @media (max-width: 600px) {
      header { padding: 14px 20px; }
      .invoice-top, .services-section, .payment-section { padding-left: 24px; padding-right: 24px; }
      .total-row { padding: 16px 24px; }
      .notes-section { padding: 14px 24px; }
    }
  </style>
</head>
<body>

<header>
  <span class="logo-main">RepairAll Auto LLC</span>
  <span class="logo-sep">|</span>
  <span class="logo-sub">Secure Payment</span>
</header>

<div class="page-wrap">
  <div class="card" id="card">
    <div class="state-screen" id="loadingScreen">
      <div class="spinner"></div>
      <div class="state-desc">Loading your invoice...</div>
    </div>
  </div>
</div>

<footer>Powered by Stripe | RepairAll Auto LLC © 2025</footer>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

  const SUPABASE_URL = 'https://kvxwjpsunapmutrpgjrp.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt2eHdqcHN1bmFwbXV0cnBnanJwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3ODcxMTksImV4cCI6MjA5MDM2MzExOX0.U8XzwR7kh5pJ8_Pq16lxuTp5wrAwA7BmXLIwpE-ZzhY';
  const STRIPE_PUBLISHABLE_KEY = 'pk_test_51TGJM5QZfqTSZT3gkyD2USHzlNoRPtHWlnkjxzEsn83gdKBuyFZsjftGB7lnEgBhoaStyp6XreWUgPDJ1N0pPW9d00EmVEB0hU';

  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON);
  const stripe = Stripe(STRIPE_PUBLISHABLE_KEY);

  const params = new URLSearchParams(location.search);
  const invoiceId = params.get('id');
  const redirectStatus = params.get('redirect_status');
  const paymentIntentId = params.get('payment_intent');
  const card = document.getElementById('card');

  function escapeHtml(value) {
    return String(value ?? '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#39;');
  }

  function formatMoney(value) {
    return '$' + Number(value || 0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  }

  function showError(title, desc) {
    card.innerHTML = `
      <div class="state-screen">
        <div class="state-icon">⚠️</div>
        <div class="state-title">${escapeHtml(title)}</div>
        <div class="state-desc">${escapeHtml(desc)}</div>
      </div>`;
  }

  function showPaidScreen(inv) {
    card.innerHTML = `
      <div class="success-screen">
        <div class="success-icon">✓</div>
        <div class="success-title">Payment Received</div>
        <div class="success-desc">Thank you, ${escapeHtml(inv.customer_name)}!<br>Your payment has been processed successfully.</div>
        <div class="success-ref">${escapeHtml(inv.invoice_id)} · RepairAll Auto LLC</div>
      </div>`;
  }

  if (!invoiceId) {
    showError('No Invoice', 'No invoice ID was provided in this link.');
  } else {
    loadInvoice();
  }

  async function loadInvoice() {
    const { data: inv, error } = await supabase
      .from('invoices')
      .select('*')
      .eq('invoice_id', invoiceId)
      .single();

    if (error || !inv) {
      showError('Invoice Not Found', 'This invoice link is invalid or has expired.');
      return;
    }

    if (redirectStatus === 'succeeded' && paymentIntentId) {
      await supabase
        .from('invoices')
        .update({ status: 'paid', stripe_payment_intent: paymentIntentId })
        .eq('invoice_id', invoiceId);

      showPaidScreen(inv);
      return;
    }

    if (inv.status === 'paid') {
      card.innerHTML = `
        <div class="success-screen">
          <div class="success-icon">✓</div>
          <div class="success-title">Already Paid</div>
          <div class="success-desc">This invoice has already been paid.<br>Thank you for your business!</div>
          <div class="success-ref">${escapeHtml(inv.invoice_id)}</div>
        </div>`;
      return;
    }

    const services = (() => {
      try { return JSON.parse(inv.services); }
      catch { return []; }
    })();

    const totalCents = Math.round(parseFloat(inv.total_amount) * 100);

    card.innerHTML = `
      <div class="invoice-top">
        <div class="inv-badge">${escapeHtml(inv.invoice_id)}</div>
        <div class="customer-name">${escapeHtml(inv.customer_name)}</div>
        ${inv.vehicle ? `<div class="vehicle-info">${escapeHtml(inv.vehicle)}</div>` : ''}
      </div>

      <div class="services-section">
        <div class="section-label">Services</div>
        ${services.map((s) => `
          <div class="service-item">
            <span class="service-name">${escapeHtml(s.name)}</span>
            <span class="service-price">${formatMoney(s.price)}</span>
          </div>
        `).join('')}
      </div>

      <div class="total-row">
        <span class="total-label">Total Due</span>
        <span class="total-amount">${formatMoney(inv.total_amount)}</span>
      </div>

      ${inv.notes ? `
        <div class="notes-section">
          <div class="section-label">Notes</div>
          <div class="notes-text">${escapeHtml(inv.notes)}</div>
        </div>` : ''}

      <div class="payment-section">
        <div class="section-label">Payment Details</div>
        <div id="payment-element"></div>
        <div id="payment-error"></div>
        <button class="pay-btn" id="payBtn">Pay ${formatMoney(inv.total_amount)}</button>
        <div class="secure-note">🔒 Secured by Stripe</div>
      </div>`;

    try {
      const res = await fetch(`${SUPABASE_URL}/functions/v1/create-payment-intent`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${SUPABASE_ANON}`,
          'apikey': SUPABASE_ANON,
        },
        body: JSON.stringify({
          amount: totalCents,
          invoice_id: invoiceId,
          currency: 'usd'
        })
      });

      const text = await res.text();
      if (!res.ok) throw new Error(text || 'Backend not configured');

      const { clientSecret } = JSON.parse(text);

      const elements = stripe.elements({
        clientSecret,
        appearance: {
          theme: 'stripe',
          variables: {
            colorPrimary: '#e8440a',
            colorBackground: '#ffffff',
            colorText: '#1a1510',
            colorDanger: '#c0392b',
            fontFamily: 'DM Sans, sans-serif',
            borderRadius: '3px',
          }
        }
      });

      const paymentElement = elements.create('payment');
      paymentElement.mount('#payment-element');

      document.getElementById('payBtn').addEventListener('click', async () => {
        const btn = document.getElementById('payBtn');
        const errEl = document.getElementById('payment-error');

        btn.disabled = true;
        btn.textContent = 'Processing...';
        errEl.style.display = 'none';

        const { error } = await stripe.confirmPayment({
          elements,
          confirmParams: {
            return_url: `${window.location.origin}${window.location.pathname}?id=${encodeURIComponent(invoiceId)}`
          }
        });

        if (error) {
          errEl.textContent = error.message || 'Payment failed.';
          errEl.style.display = 'block';
          btn.disabled = false;
          btn.textContent = `Pay ${formatMoney(inv.total_amount)}`;
        }
      });
    } catch (e) {
      document.getElementById('payment-element').innerHTML = `
        <div style="padding:16px;background:#fdf8f5;border:1px dashed #e0d8cc;border-radius:3px;font-size:12px;color:#9a9088;font-family:'DM Mono',monospace;letter-spacing:1px;line-height:1.8;">
          ⚠️ PAYMENT UNAVAILABLE<br>
          Could not connect to payment processor.<br>
          Please contact RepairAll Auto LLC directly.
        </div>`;
      console.error('Payment setup error:', e);
    }
  }
</script>
</body>
</html>
