<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RepairAll Auto LLC - Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0e0e0e;
      --surface: #161616;
      --surface2: #1f1f1f;
      --border: #2a2a2a;
      --accent: #e8440a;
      --accent-dim: rgba(232, 68, 10, 0.12);
      --text: #f0ece6;
      --muted: #6b6560;
      --success: #2dbd6e;
      --warning: #f0a020;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
      opacity: 0.4;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 20px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: rgba(14,14,14,0.92);
      backdrop-filter: blur(12px);
      z-index: 100;
    }

    .logo { display: flex; align-items: baseline; gap: 10px; }
    .logo-main { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 2px; color: var(--text); }
    .logo-tag { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--accent); letter-spacing: 3px; text-transform: uppercase; border: 1px solid var(--accent); padding: 2px 7px; border-radius: 2px; }
    .header-right { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 1px; display: flex; align-items: center; gap: 16px; }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 48px 40px;
      display: grid;
      grid-template-columns: 420px 1fr;
      gap: 32px;
      align-items: start;
    }

    .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
    .panel-header { padding: 20px 28px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
    .panel-header .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
    .panel-header h2 { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; font-weight: 600; color: var(--muted); }
    .panel-body { padding: 28px; }
    .field { margin-bottom: 20px; }

    label { display: block; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); font-weight: 600; margin-bottom: 8px; font-family: 'DM Mono', monospace; }

    input, textarea, select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      padding: 12px 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus, textarea:focus, select:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 80px; }

    .services-list { margin-bottom: 8px; }

    .service-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .service-row input { font-size: 13px; padding: 9px 12px; }
    .service-row .price-in { width: 90px; font-family: 'DM Mono', monospace; font-size: 13px; text-align: right; }

    .remove-btn { background: none; border: 1px solid var(--border); color: var(--muted); width: 30px; height: 30px; border-radius: 3px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; flex-shrink: 0; }
    .remove-btn:hover { border-color: var(--accent); color: var(--accent); }

    .add-service-btn { background: none; border: 1px dashed var(--border); color: var(--muted); width: 100%; padding: 9px; border-radius: 3px; cursor: pointer; font-size: 12px; letter-spacing: 1px; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
    .add-service-btn:hover { border-color: var(--accent); color: var(--accent); }

    .total-bar { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; background: var(--accent-dim); border: 1px solid rgba(232,68,10,0.2); border-radius: 3px; margin-top: 16px; }
    .total-bar .label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); font-family: 'DM Mono', monospace; font-weight: 500; }
    .total-bar .amount { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--accent); letter-spacing: 2px; }

    .submit-btn { width: 100%; background: var(--accent); border: none; color: #fff; font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 3px; padding: 16px; border-radius: 3px; cursor: pointer; margin-top: 20px; transition: all 0.2s; }
    .submit-btn:hover { background: #d03a08; }
    .submit-btn:active { transform: scale(0.99); }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .invoices-panel { display: flex; flex-direction: column; gap: 16px; }
    .invoices-header { display: flex; align-items: center; justify-content: space-between; }
    .invoices-title { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 2px; color: var(--text); }
    .invoice-count { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 1px; }

    .filter-row { display: flex; gap: 8px; }
    .filter-btn { background: none; border: 1px solid var(--border); color: var(--muted); font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; padding: 6px 14px; border-radius: 2px; cursor: pointer; transition: all 0.15s; }
    .filter-btn.active, .filter-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

    .invoice-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 20px 24px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      animation: fadeUp 0.25s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .invoice-card:hover { border-color: #3a3a3a; background: #1a1a1a; }
    .invoice-card.paid { border-left: 3px solid var(--success); }
    .invoice-card.pending { border-left: 3px solid var(--warning); }

    .inv-name { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
    .inv-desc { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
    .inv-meta { display: flex; gap: 16px; align-items: center; }
    .inv-date { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 1px; }

    .status-badge { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; padding: 3px 8px; border-radius: 2px; }
    .status-badge.paid { background: rgba(45,189,110,0.12); color: var(--success); border: 1px solid rgba(45,189,110,0.3); }
    .status-badge.pending { background: rgba(240,160,32,0.12); color: var(--warning); border: 1px solid rgba(240,160,32,0.3); }

    .inv-right { text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 10px; }
    .inv-amount { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 1px; color: var(--text); }
    .inv-actions { display: flex; gap: 6px; }

    .copy-btn { background: none; border: 1px solid var(--border); color: var(--muted); font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 1px; padding: 5px 10px; border-radius: 2px; cursor: pointer; transition: all 0.15s; text-transform: uppercase; }
    .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
    .copy-btn.copied { border-color: var(--success); color: var(--success); }

    .empty-state { padding: 60px 20px; text-align: center; color: var(--muted); font-size: 13px; letter-spacing: 1px; border: 1px dashed var(--border); border-radius: 4px; font-family: 'DM Mono', monospace; }
    .empty-state .icon { font-size: 32px; margin-bottom: 12px; opacity: 0.3; }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .overlay.open { opacity: 1; pointer-events: all; }

    .detail-panel {
      position: fixed;
      top: 0; right: 0;
      width: 440px;
      max-width: 100vw;
      height: 100vh;
      background: var(--surface);
      border-left: 1px solid var(--border);
      z-index: 201;
      overflow-y: auto;
      transform: translateX(100%);
      transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
    }
    .detail-panel.open { transform: translateX(0); }

    .detail-header {
      padding: 24px 28px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: var(--surface);
      z-index: 1;
    }

    .detail-header-left { display: flex; flex-direction: column; gap: 4px; }
    .detail-inv-id { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; }
    .detail-name { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 2px; color: var(--text); }

    .close-btn { background: none; border: 1px solid var(--border); color: var(--muted); width: 36px; height: 36px; border-radius: 3px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; flex-shrink: 0; }
    .close-btn:hover { border-color: var(--accent); color: var(--accent); }

    .detail-body { padding: 24px 28px; display: flex; flex-direction: column; gap: 24px; }
    .detail-section-label { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }

    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .detail-field { display: flex; flex-direction: column; gap: 4px; }
    .detail-field-label { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
    .detail-field-value { font-size: 14px; color: var(--text); font-weight: 500; }
    .detail-field-value.mono { font-family: 'DM Mono', monospace; font-size: 13px; }

    .detail-services { display: flex; flex-direction: column; border: 1px solid var(--border); border-radius: 3px; overflow: hidden; }
    .detail-service-row { display: flex; justify-content: space-between; align-items: center; padding: 11px 14px; font-size: 13px; border-bottom: 1px solid var(--border); }
    .detail-service-row:last-child { border-bottom: none; }
    .detail-service-name { color: var(--text); }
    .detail-service-price { font-family: 'DM Mono', monospace; color: var(--muted); font-size: 13px; }

    .detail-total { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; background: var(--accent-dim); border: 1px solid rgba(232,68,10,0.2); border-radius: 3px; margin-top: 10px; }
    .detail-total-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; }
    .detail-total-amount { font-family: 'Bebas Neue', sans-serif; font-size: 32px; color: var(--accent); letter-spacing: 2px; }

    .detail-notes { background: var(--surface2); border: 1px solid var(--border); border-radius: 3px; padding: 14px; font-size: 13px; color: var(--muted); line-height: 1.6; }

    .detail-actions { display: flex; flex-direction: column; gap: 10px; padding-top: 4px; }

    .action-btn { width: 100%; padding: 13px; border-radius: 3px; cursor: pointer; font-family: 'Bebas Neue', sans-serif; font-size: 17px; letter-spacing: 2px; transition: all 0.2s; border: none; }
    .action-btn.sms { background: none; border: 1px solid rgba(45,189,110,0.3); color: var(--success); }
    .action-btn.sms:hover { background: rgba(45,189,110,0.08); }
    .action-btn.secondary { background: none; border: 1px solid var(--border); color: var(--muted); }
    .action-btn.secondary:hover { border-color: var(--accent); color: var(--accent); }
    .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .toast { position: fixed; bottom: 32px; right: 32px; background: var(--surface2); border: 1px solid var(--border); border-left: 3px solid var(--success); padding: 14px 20px; border-radius: 4px; font-size: 13px; font-family: 'DM Sans', sans-serif; z-index: 1000; transform: translateY(80px); opacity: 0; transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); max-width: 320px; }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.error { border-left-color: var(--accent); }

    @media (max-width: 900px) {
      main { grid-template-columns: 1fr; padding: 24px 20px; }
      header { padding: 16px 20px; }
      .detail-panel { width: 100vw; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-main">RepairAll Auto LLC</span>
    <span class="logo-tag">Dashboard</span>
  </div>
  <div class="header-right" id="headerDate"></div>
</header>

<main>
  <div class="panel">
    <div class="panel-header">
      <div class="dot"></div>
      <h2>New Invoice</h2>
    </div>
    <div class="panel-body">
      <div class="field">
        <label>Customer Name</label>
        <input type="text" id="customerName" placeholder="John Smith" />
      </div>
      <div class="field">
        <label>Customer Phone</label>
        <input type="tel" id="customerContact" placeholder="+1 (555) 000-0000" />
      </div>
      <div class="field">
        <label>Vehicle</label>
        <input type="text" id="vehicle" placeholder="2019 Honda Civic - Black" />
      </div>
      <div class="field">
        <label>Services</label>
        <div class="services-list" id="servicesList"></div>
        <button class="add-service-btn" type="button" onclick="addServiceRow()">+ Add Service</button>
        <div class="total-bar">
          <span class="label">Total</span>
          <span class="amount" id="totalDisplay">$0.00</span>
        </div>
      </div>
      <div class="field">
        <label>Notes (optional)</label>
        <textarea id="notes" placeholder="Any additional notes for the customer..."></textarea>
      </div>
      <button class="submit-btn" id="submitBtn" type="button" onclick="createInvoice()">Generate &amp; Send Invoice</button>
    </div>
  </div>

  <div class="invoices-panel">
    <div class="invoices-header">
      <span class="invoices-title">Invoices</span>
      <span class="invoice-count" id="invoiceCount">0 invoices</span>
    </div>
    <div class="filter-row">
      <button class="filter-btn active" type="button" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" type="button" onclick="setFilter('pending', this)">Pending</button>
      <button class="filter-btn" type="button" onclick="setFilter('paid', this)">Paid</button>
    </div>
    <div id="invoiceList"></div>
  </div>
</main>

<div class="overlay" id="overlay" onclick="closePanel()"></div>

<div class="detail-panel" id="detailPanel">
  <div class="detail-header">
    <div class="detail-header-left">
      <span class="detail-inv-id" id="dp-id"></span>
      <span class="detail-name" id="dp-name"></span>
    </div>
    <button class="close-btn" type="button" onclick="closePanel()">✕</button>
  </div>
  <div class="detail-body" id="dp-body"></div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

  const SUPABASE_URL = 'https://kvxwjpsunapmutrpgjrp.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt2eHdqcHN1bmFwbXV0cnBnanJwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3ODcxMTksImV4cCI6MjA5MDM2MzExOX0.U8XzwR7kh5pJ8_Pq16lxuTp5wrAwA7BmXLIwpE-ZzhY';

  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON);

  const { data: { session } } = await supabase.auth.getSession();
  if (!session) window.location.href = '/login.html';

  const headerRight = document.getElementById('headerDate');
  const dateSpan = document.createElement('span');
  dateSpan.textContent = new Date().toLocaleDateString('en-US', {
    weekday: 'short',
    month: 'short',
    day: 'numeric',
    year: 'numeric'
  }).toUpperCase();

  const logoutBtn = document.createElement('button');
  logoutBtn.textContent = 'Sign Out';
  logoutBtn.style.cssText = 'background:none;border:1px solid #2a2a2a;color:#6b6560;font-family:DM Mono,monospace;font-size:10px;letter-spacing:1px;padding:5px 12px;border-radius:2px;cursor:pointer;text-transform:uppercase;';
  logoutBtn.onmouseover = () => {
    logoutBtn.style.borderColor = '#e8440a';
    logoutBtn.style.color = '#e8440a';
  };
  logoutBtn.onmouseout = () => {
    logoutBtn.style.borderColor = '#2a2a2a';
    logoutBtn.style.color = '#6b6560';
  };
  logoutBtn.onclick = async () => {
    await supabase.auth.signOut();
    window.location.href = '/login.html';
  };

  headerRight.appendChild(dateSpan);
  headerRight.appendChild(logoutBtn);

  let currentFilter = 'all';
  let services = [];
  window._invoices = [];

  function escapeHtml(value) {
    return String(value ?? '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#39;');
  }

  function formatMoney(value) {
    return '$' + Number(value || 0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  }

  function updateTotal() {
    const total = services.reduce((sum, s) => sum + (parseFloat(s.price) || 0), 0);
    document.getElementById('totalDisplay').textContent = formatMoney(total);
    return total;
  }

  function renderServices() {
    const list = document.getElementById('servicesList');
    list.innerHTML = services.map((s) => `
      <div class="service-row" id="row-${s.id}">
        <input
          type="text"
          placeholder="Oil Change, Brake Pads..."
          value="${escapeHtml(s.name)}"
          oninput="updateService(${s.id}, 'name', this.value)"
        />
        <input
          type="number"
          class="price-in"
          placeholder="0.00"
          value="${escapeHtml(s.price)}"
          oninput="updateService(${s.id}, 'price', this.value)"
          min="0"
          step="0.01"
        />
        <button class="remove-btn" type="button" onclick="removeService(${s.id})">×</button>
      </div>
    `).join('');
    updateTotal();
  }

  window.addServiceRow = function(name = '', price = '') {
    const id = Date.now() + Math.floor(Math.random() * 1000);
    services.push({ id, name, price });
    renderServices();
  };

  window.updateService = function(id, key, value) {
    const service = services.find((x) => x.id === id);
    if (service) {
      service[key] = value;
      updateTotal();
    }
  };

  window.removeService = function(id) {
    services = services.filter((x) => x.id !== id);
    renderServices();
  };

  async function sendSMS(phone, customerName, total, link, invoiceId) {
    const res = await fetch(`${SUPABASE_URL}/functions/v1/send-invoice-sms`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${SUPABASE_ANON}`,
        'apikey': SUPABASE_ANON,
      },
      body: JSON.stringify({
        phone,
        customerName,
        total,
        link,
        invoiceId
      })
    });

    const text = await res.text();

    if (!res.ok) {
      console.error('SMS failed:', text);
      throw new Error(`SMS failed: ${text}`);
    }

    return JSON.parse(text);
  }

  window.createInvoice = async function() {
    const name = document.getElementById('customerName').value.trim();
    const contact = document.getElementById('customerContact').value.trim();
    const vehicle = document.getElementById('vehicle').value.trim();
    const notes = document.getElementById('notes').value.trim();
    const cleanedServices = services
      .map((s) => ({ name: s.name.trim(), price: parseFloat(s.price) || 0 }))
      .filter((s) => s.name && s.price >= 0);
    const total = cleanedServices.reduce((sum, s) => sum + s.price, 0);

    if (!name) return showToast('Customer name is required.', true);
    if (!contact) return showToast('Customer phone number is required.', true);
    if (cleanedServices.length === 0) return showToast('Add at least one service.', true);
    if (total <= 0) return showToast('Total must be greater than $0.', true);

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'Creating...';

    try {
      const invoiceId = 'INV-' + Math.random().toString(36).slice(2, 10).toUpperCase();

      const { data, error } = await supabase
        .from('invoices')
        .insert([{
          invoice_id: invoiceId,
          customer_name: name,
          customer_contact: contact,
          vehicle,
          services: JSON.stringify(cleanedServices),
          total_amount: total,
          notes,
          status: 'pending',
          created_at: new Date().toISOString()
        }])
        .select()
        .single();

      if (error) throw error;

      btn.textContent = 'Sending SMS...';

      const link = `${location.origin}/customer.html?id=${encodeURIComponent(data.invoice_id)}`;
      await sendSMS(contact, name, total, link, data.invoice_id);

      showToast(`Invoice created and SMS sent to ${contact}!`);
      navigator.clipboard.writeText(link).catch(() => {});

      document.getElementById('customerName').value = '';
      document.getElementById('customerContact').value = '';
      document.getElementById('vehicle').value = '';
      document.getElementById('notes').value = '';
      services = [];
      addServiceRow();
      await loadInvoices();
    } catch (err) {
      console.error(err);
      showToast(err instanceof Error ? err.message : 'Something went wrong.', true);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Generate & Send Invoice';
    }
  };

  async function loadInvoices() {
    const { data, error } = await supabase
      .from('invoices')
      .select('*')
      .order('created_at', { ascending: false });

    if (error) {
      console.error(error);
      showToast('Could not load invoices.', true);
      return;
    }

    window._invoices = data || [];
    const filtered = currentFilter === 'all'
      ? window._invoices
      : window._invoices.filter((i) => i.status === currentFilter);

    document.getElementById('invoiceCount').textContent =
      `${filtered.length} invoice${filtered.length !== 1 ? 's' : ''}`;

    const list = document.getElementById('invoiceList');

    if (filtered.length === 0) {
      list.innerHTML = `<div class="empty-state"><div class="icon">📋</div>No ${currentFilter === 'all' ? '' : currentFilter + ' '}invoices yet</div>`;
      return;
    }

    list.innerHTML = filtered.map((inv) => {
      const date = new Date(inv.created_at).toLocaleDateString('en-US', {
        month: 'short',
        day: 'numeric',
        year: 'numeric'
      });
      const link = `${location.origin}/customer.html?id=${encodeURIComponent(inv.invoice_id)}`;
      const serviceList = (() => {
        try {
          return JSON.parse(inv.services).map((s) => s.name).join(', ');
        } catch {
          return inv.services || '';
        }
      })();

      return `
        <div class="invoice-card ${escapeHtml(inv.status)}" onclick="openPanel('${escapeHtml(inv.invoice_id)}')">
          <div>
            <div class="inv-name">${escapeHtml(inv.customer_name)}</div>
            <div class="inv-desc">${inv.vehicle ? `${escapeHtml(inv.vehicle)} - ` : ''}${escapeHtml(serviceList)}</div>
            <div class="inv-meta">
              <span class="inv-date">${escapeHtml(date)} · ${escapeHtml(inv.invoice_id)}</span>
              <span class="status-badge ${escapeHtml(inv.status)}">${escapeHtml(inv.status)}</span>
            </div>
          </div>
          <div class="inv-right">
            <span class="inv-amount">${formatMoney(inv.total_amount)}</span>
            <div class="inv-actions">
              <button class="copy-btn" type="button" onclick="event.stopPropagation(); copyLink('${link}', this)">Copy Link</button>
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  window.openPanel = function(invoiceId) {
    const inv = window._invoices.find((i) => i.invoice_id === invoiceId);
    if (!inv) return;

    document.getElementById('dp-id').textContent = inv.invoice_id;
    document.getElementById('dp-name').textContent = inv.customer_name;

    const servicesList = (() => {
      try { return JSON.parse(inv.services); }
      catch { return []; }
    })();

    const date = new Date(inv.created_at).toLocaleDateString('en-US', {
      weekday: 'long',
      month: 'long',
      day: 'numeric',
      year: 'numeric'
    });
    const link = `${location.origin}/customer.html?id=${encodeURIComponent(inv.invoice_id)}`;

    document.getElementById('dp-body').innerHTML = `
      <div class="detail-section">
        <div class="detail-section-label">Customer Info</div>
        <div class="detail-grid">
          <div class="detail-field">
            <span class="detail-field-label">Phone</span>
            <span class="detail-field-value mono">${escapeHtml(inv.customer_contact || '')}</span>
          </div>
          <div class="detail-field">
            <span class="detail-field-label">Status</span>
            <span class="detail-field-value"><span class="status-badge ${escapeHtml(inv.status)}">${escapeHtml(inv.status)}</span></span>
          </div>
          <div class="detail-field" style="grid-column:1/-1">
            <span class="detail-field-label">Vehicle</span>
            <span class="detail-field-value">${escapeHtml(inv.vehicle || '')}</span>
          </div>
          <div class="detail-field" style="grid-column:1/-1">
            <span class="detail-field-label">Date Created</span>
            <span class="detail-field-value">${escapeHtml(date)}</span>
          </div>
        </div>
      </div>

      <div class="detail-section">
        <div class="detail-section-label">Services</div>
        <div class="detail-services">
          ${servicesList.map((s) => `
            <div class="detail-service-row">
              <span class="detail-service-name">${escapeHtml(s.name)}</span>
              <span class="detail-service-price">${formatMoney(s.price)}</span>
            </div>
          `).join('')}
        </div>
        <div class="detail-total">
          <span class="detail-total-label">Total Due</span>
          <span class="detail-total-amount">${formatMoney(inv.total_amount)}</span>
        </div>
      </div>

      ${inv.notes ? `
      <div class="detail-section">
        <div class="detail-section-label">Notes</div>
        <div class="detail-notes">${escapeHtml(inv.notes)}</div>
      </div>` : ''}

      <div class="detail-actions">
        <button class="action-btn sms" id="resendSmsBtn" type="button" onclick="resendSMS('${escapeHtml(inv.invoice_id)}')">
          📱 Resend SMS to ${escapeHtml(inv.customer_contact || 'Customer')}
        </button>
        <button class="action-btn secondary" type="button" onclick="copyLink('${link}', this)">Copy Payment Link</button>
      </div>
    `;

    document.getElementById('overlay').classList.add('open');
    document.getElementById('detailPanel').classList.add('open');
    document.body.style.overflow = 'hidden';
  };

  window.closePanel = function() {
    document.getElementById('overlay').classList.remove('open');
    document.getElementById('detailPanel').classList.remove('open');
    document.body.style.overflow = '';
  };

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closePanel();
  });

  window.resendSMS = async function(invoiceId) {
    const inv = window._invoices.find((i) => i.invoice_id === invoiceId);
    if (!inv) return;

    const btn = document.getElementById('resendSmsBtn');
    btn.disabled = true;
    btn.textContent = 'Sending...';

    try {
      const link = `${location.origin}/customer.html?id=${encodeURIComponent(inv.invoice_id)}`;
      await sendSMS(inv.customer_contact, inv.customer_name, inv.total_amount, link, inv.invoice_id);
      btn.textContent = `📱 Resend SMS to ${inv.customer_contact}`;
      showToast(`SMS resent to ${inv.customer_contact}!`);
    } catch (err) {
      console.error(err);
      btn.textContent = `📱 Resend SMS to ${inv.customer_contact}`;
      showToast(err instanceof Error ? err.message : 'Could not resend SMS.', true);
    } finally {
      btn.disabled = false;
    }
  };

  window.copyLink = function(link, btn) {
    navigator.clipboard.writeText(link).then(() => {
      const original = btn.textContent;
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = original;
        btn.classList.remove('copied');
      }, 2000);
    });
  };

  window.setFilter = function(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach((b) => b.classList.remove('active'));
    btn.classList.add('active');
    loadInvoices();
  };

  function showToast(message, isError = false) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.className = 'toast show' + (isError ? ' error' : '');
    setTimeout(() => toast.classList.remove('show'), 3500);
  }

  addServiceRow();
  loadInvoices();

  supabase
    .channel('invoices')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'invoices' }, () => loadInvoices())
    .subscribe();
</script>
</body>
</html>
