<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:          #000;
      --text:        #fff;
      --muted:       rgba(255,255,255,0.42);
      --border:      rgba(255,255,255,0.13);
      --surface:     rgba(255,255,255,0.03);
      --surface2:    rgba(255,255,255,0.06);
      --accent:      #e8440a;
      --accent-dim:  rgba(232,68,10,0.1);
      --success:     #2dbd6e;
      --warning:     #f0a020;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Header ── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2.5rem;
      border-bottom: 1px solid var(--border);
      background: rgba(0,0,0,0.92);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index: 100;
    }

    .logo { display: flex; align-items: center; gap: 10px; }

    .logo-name {
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: -0.01em;
      color: var(--text);
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .logo-name:hover { opacity: 0.65; }

    .logo-tag {
      font-size: 0.58rem;
      color: var(--accent);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border: 1px solid rgba(232,68,10,0.35);
      padding: 2px 7px;
      border-radius: 2px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 1rem;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    .signout-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-size: 0.6rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 500;
      padding: 5px 13px;
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .signout-btn:hover { border-color: rgba(255,255,255,0.3); color: var(--text); }

    /* ── Main grid ── */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 5rem 2.5rem 3rem;
      display: grid;
      grid-template-columns: 400px 1fr;
      gap: 2rem;
      align-items: start;
    }

    /* ── Panel ── */
    .panel {
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--surface);
      overflow: hidden;
    }

    .panel-header {
      padding: 0.875rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .panel-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
    .panel-title { font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); font-weight: 600; }

    .panel-body { padding: 1.5rem; }

    /* ── Form ── */
    .field { margin-bottom: 1.125rem; }

    .field label {
      display: block;
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 0.4rem;
    }

    .field input,
    .field select {
      width: 100%;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.875rem;
      padding: 0.65rem 0.875rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus,
    .field select:focus { border-color: rgba(255,255,255,0.35); }

    /* ── Services (legacy, kept for detail panel rendering) ── */
    .service-row {
      display: grid;
      grid-template-columns: 1fr 88px 30px;
      gap: 6px;
      align-items: center;
      margin-bottom: 6px;
    }
    .service-row input { font-size: 0.8rem; padding: 0.5rem 0.7rem; }
    .service-row .price-in { text-align: right; font-variant-numeric: tabular-nums; }

    .remove-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      width: 30px; height: 30px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .remove-btn:hover { border-color: var(--accent); color: var(--accent); }

    .add-service-btn {
      background: none;
      border: 1px dashed var(--border);
      color: var(--muted);
      width: 100%;
      padding: 0.5rem;
      border-radius: 3px;
      cursor: pointer;
      font-size: 0.75rem;
      font-family: 'Inter', sans-serif;
      transition: all 0.15s;
    }
    .add-service-btn:hover { border-color: rgba(255,255,255,0.3); color: var(--text); }

    .total-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.7rem 1rem;
      border: 1px solid var(--border);
      border-radius: 3px;
      margin-top: 0.75rem;
      background: var(--surface2);
    }
    .total-bar .label { font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); font-weight: 600; }
    .total-bar .amount { font-size: 1.1rem; font-weight: 700; font-variant-numeric: tabular-nums; }

    /* ── Quick input ── */
    .input-hint {
      font-size: 0.7rem;
      color: var(--muted);
      margin-bottom: 0.875rem;
      letter-spacing: 0.02em;
    }

    .quick-input {
      width: 100%;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      padding: 0.875rem;
      outline: none;
      resize: none;
      line-height: 1.5;
      transition: border-color 0.2s;
      margin-bottom: 1rem;
    }
    .quick-input:focus { border-color: rgba(255,255,255,0.35); }
    .quick-input::placeholder { color: var(--muted); font-size: 0.9rem; }

    /* ── Confirm card ── */
    .confirm-card {
      border: 1px solid var(--border);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 1.25rem;
    }
    .confirm-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      gap: 1rem;
    }
    .confirm-row:last-child { border-bottom: none; }
    .confirm-label {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      font-weight: 600;
      flex-shrink: 0;
    }
    .confirm-val {
      font-size: 0.875rem;
      font-weight: 500;
      text-align: right;
    }

    .confirm-actions {
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }

    .ghost-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.06em;
      font-weight: 600;
      padding: 0.875rem 1rem;
      border-radius: 3px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }
    .ghost-btn:hover { border-color: rgba(255,255,255,0.3); color: var(--text); }

    .submit-btn {
      width: 100%;
      background: var(--text);
      border: none;
      color: var(--bg);
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.875rem;
      border-radius: 3px;
      cursor: pointer;
      margin-top: 1.25rem;
      transition: opacity 0.2s;
    }
    .submit-btn:hover { opacity: 0.85; }
    .submit-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── Invoice list ── */
    .invoices-panel { display: flex; flex-direction: column; gap: 1rem; }

    .invoices-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
    }
    .invoices-title { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.03em; }
    .invoice-count { font-size: 0.63rem; color: var(--muted); letter-spacing: 0.06em; }

    .filter-row { display: flex; gap: 6px; }
    .filter-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-size: 0.6rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 500;
      padding: 5px 14px;
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-btn.active,
    .filter-btn:hover { border-color: rgba(255,255,255,0.35); color: var(--text); }

    .invoice-card {
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1rem 1.25rem;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0.75rem;
      align-items: center;
      cursor: pointer;
      background: var(--surface);
      transition: background 0.15s, border-color 0.15s;
    }
    .invoice-card:hover { background: var(--surface2); border-color: rgba(255,255,255,0.2); }
    .invoice-card.paid    { border-left: 2px solid var(--success); }
    .invoice-card.pending { border-left: 2px solid var(--warning); }

    .inv-name  { font-size: 0.9rem; font-weight: 600; margin-bottom: 2px; }
    .inv-desc  { font-size: 0.75rem; color: var(--muted); margin-bottom: 6px; }
    .inv-meta  { display: flex; gap: 10px; align-items: center; }
    .inv-date  { font-size: 0.63rem; color: var(--muted); }

    .status-badge {
      font-size: 0.58rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 2px;
      font-weight: 600;
    }
    .status-badge.paid    { background: rgba(45,189,110,0.1);  color: var(--success); border: 1px solid rgba(45,189,110,0.25); }
    .status-badge.pending { background: rgba(240,160,32,0.1); color: var(--warning); border: 1px solid rgba(240,160,32,0.25); }

    .inv-right  { text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
    .inv-amount { font-size: 1.05rem; font-weight: 700; font-variant-numeric: tabular-nums; }
    .inv-actions { display: flex; gap: 5px; }

    .copy-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-size: 0.58rem;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .copy-btn:hover { border-color: rgba(255,255,255,0.3); color: var(--text); }
    .copy-btn.copied { border-color: var(--success); color: var(--success); }

    .empty-state {
      padding: 3rem 1.25rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.78rem;
      letter-spacing: 0.05em;
      border: 1px dashed var(--border);
      border-radius: 4px;
    }
    .empty-state .icon { font-size: 2rem; margin-bottom: 0.75rem; opacity: 0.3; }

    /* ── Slide-out detail panel ── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 200;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
    }
    .overlay.open { opacity: 1; pointer-events: all; }

    .detail-panel {
      position: fixed;
      top: 0; right: 0;
      width: 420px; max-width: 100vw;
      height: 100vh;
      background: #070707;
      border-left: 1px solid var(--border);
      z-index: 201;
      overflow-y: auto;
      transform: translateX(100%);
      transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
    }
    .detail-panel.open { transform: translateX(0); }

    .detail-header {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky; top: 0;
      background: #070707;
      z-index: 1;
    }
    .detail-inv-id { font-size: 0.6rem; letter-spacing: 0.12em; color: var(--accent); text-transform: uppercase; margin-bottom: 3px; }
    .detail-name { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.02em; }

    .close-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      width: 32px; height: 32px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .close-btn:hover { border-color: rgba(255,255,255,0.3); color: var(--text); }

    .detail-body { padding: 1.5rem; display: flex; flex-direction: column; gap: 1.5rem; }
    .detail-section-label { font-size: 0.58rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); font-weight: 600; margin-bottom: 0.75rem; }

    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.875rem; }
    .detail-field { display: flex; flex-direction: column; gap: 3px; }
    .detail-field-label { font-size: 0.58rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
    .detail-field-value { font-size: 0.875rem; font-weight: 500; }

    .detail-services { border: 1px solid var(--border); border-radius: 3px; overflow: hidden; }
    .detail-svc-row { display: flex; justify-content: space-between; padding: 0.65rem 0.875rem; font-size: 0.82rem; border-bottom: 1px solid var(--border); }
    .detail-svc-row:last-child { border-bottom: none; }
    .detail-svc-name { color: var(--text); }
    .detail-svc-price { color: var(--muted); font-variant-numeric: tabular-nums; }

    .detail-total {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.7rem 0.875rem;
      border: 1px solid var(--border); border-radius: 3px; margin-top: 0.5rem;
      background: var(--surface2);
    }
    .detail-total-label { font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); font-weight: 600; }
    .detail-total-amount { font-size: 1.25rem; font-weight: 700; font-variant-numeric: tabular-nums; }

    .detail-notes { background: var(--surface); border: 1px solid var(--border); border-radius: 3px; padding: 0.875rem; font-size: 0.82rem; color: var(--muted); line-height: 1.6; }

    .detail-actions { display: flex; flex-direction: column; gap: 0.625rem; }

    .action-btn {
      width: 100%;
      padding: 0.75rem;
      border-radius: 3px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      transition: all 0.2s;
      border: 1px solid var(--border);
      background: none;
      color: var(--muted);
    }
    .action-btn:hover { border-color: rgba(255,255,255,0.3); color: var(--text); }
    .action-btn.primary { background: var(--text); border-color: var(--text); color: var(--bg); }
    .action-btn.primary:hover { opacity: 0.85; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 2rem; right: 2rem;
      background: #111;
      border: 1px solid var(--border);
      border-left: 3px solid var(--success);
      padding: 0.875rem 1.25rem;
      border-radius: 4px;
      font-size: 0.82rem;
      z-index: 1000;
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      max-width: 300px;
    }
    .toast.show  { transform: translateY(0); opacity: 1; }
    .toast.error { border-left-color: var(--accent); }

    /* ── Responsive ── */
    @media (max-width: 860px) {
      main   { grid-template-columns: 1fr; padding: 4.5rem 1.25rem 2rem; }
      header { padding: 0 1.25rem; }
      .header-date { display: none; }
      .detail-panel { width: 100vw; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-name" id="shopNameHeader" title="Click to rename">Your Shop</span>
    <span class="logo-tag">Dashboard</span>
  </div>
  <div class="header-right">
    <span class="header-date" id="headerDate"></span>
    <button class="signout-btn" id="signoutBtn">Sign Out</button>
  </div>
</header>

<main>
  <!-- ── Create Invoice panel ── -->
  <div class="panel">
    <div class="panel-header">
      <div class="panel-dot"></div>
      <span class="panel-title">New Invoice</span>
    </div>

    <!-- Step 1: Quick input -->
    <div class="panel-body" id="inputStep">
      <p class="input-hint">Type it how you'd say it:</p>
      <textarea id="quickInput" class="quick-input" placeholder="Ali 8622145237 brake pad $150" rows="3" autocomplete="off" autocorrect="off" spellcheck="false"></textarea>
      <button class="submit-btn" id="parseBtn">Parse →</button>
    </div>

    <!-- Step 2: Confirm parsed result -->
    <div class="panel-body" id="confirmStep" style="display:none;">
      <p class="input-hint">Does this look right?</p>
      <div class="confirm-card">
        <div class="confirm-row"><span class="confirm-label">Name</span><span class="confirm-val" id="c-name"></span></div>
        <div class="confirm-row"><span class="confirm-label">Phone</span><span class="confirm-val" id="c-phone"></span></div>
        <div class="confirm-row"><span class="confirm-label">Service</span><span class="confirm-val" id="c-service"></span></div>
        <div class="confirm-row"><span class="confirm-label">Total</span><span class="confirm-val" id="c-total"></span></div>
      </div>
      <div class="confirm-actions">
        <button class="ghost-btn" id="editBtn">← Edit</button>
        <button class="submit-btn" id="confirmBtn" style="flex:1;">Confirm &amp; Send →</button>
      </div>
    </div>
  </div>

  <!-- ── Invoices list ── -->
  <div class="invoices-panel">
    <div class="invoices-header">
      <span class="invoices-title">Invoices</span>
      <span class="invoice-count" id="invoiceCount">—</span>
    </div>
    <div class="filter-row">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="pending">Pending</button>
      <button class="filter-btn" data-filter="paid">Paid</button>
    </div>
    <div id="invoiceList"></div>
  </div>
</main>

<!-- Slide-out detail panel -->
<div class="overlay"      id="overlay"></div>
<div class="detail-panel" id="detailPanel">
  <div class="detail-header">
    <div>
      <div class="detail-inv-id" id="dp-id"></div>
      <div class="detail-name"   id="dp-name"></div>
    </div>
    <button class="close-btn" id="closeBtn">✕</button>
  </div>
  <div class="detail-body" id="dp-body"></div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── Auth guard ──────────────────────────────────────────────
  if (localStorage.getItem('mechanic_session') !== 'authenticated') {
    window.location.href = '/login';
  }

  // ── Config ─────────────────────────────────────────────────
  // Airtable calls go through /api/mechanic-invoices
  // so the API key stays server-side and won't trip secret scanning.
  const INVOICES_FN = '/api/mechanic-invoices';

  // ── Shop name ───────────────────────────────────────────────
  let shopName = localStorage.getItem('mechanic_shop_name') || 'Your Shop';

  function applyShopName(name) {
    document.getElementById('shopNameHeader').textContent = name;
    document.title = name + ' — Dashboard';
  }
  applyShopName(shopName);

  document.getElementById('shopNameHeader').addEventListener('click', () => {
    const n = prompt('Enter your shop name:', shopName);
    if (!n || !n.trim() || n.trim() === shopName) return;
    shopName = n.trim();
    applyShopName(shopName);
    localStorage.setItem('mechanic_shop_name', shopName);
    showToast('Shop name updated!');
  });

  // ── Header date + sign out ──────────────────────────────────
  document.getElementById('headerDate').textContent = new Date().toLocaleDateString('en-US', {
    weekday: 'short', month: 'short', day: 'numeric', year: 'numeric'
  }).toUpperCase();

  document.getElementById('signoutBtn').addEventListener('click', () => {
    localStorage.removeItem('mechanic_session');
    window.location.href = '/login';
  });

  // ── Utilities ───────────────────────────────────────────────
  function escapeHtml(v) {
    return String(v ?? '').replaceAll('&','&amp;').replaceAll('<','&lt;')
      .replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#39;');
  }
  function formatMoney(v) {
    return '$' + Number(v || 0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  }
  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className   = 'toast show' + (isError ? ' error' : '');
    setTimeout(() => t.classList.remove('show'), 3500);
  }

  // ── API helpers (via Netlify Function) ─────────────────────
  async function atGet() {
    const res  = await fetch(INVOICES_FN);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed to load invoices');
    return data;
  }
  async function atPost(fields) {
    const res  = await fetch(INVOICES_FN, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ fields }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed to create invoice');
    return data;
  }

  // ── Natural language parser ─────────────────────────────────
  function parseInput(raw) {
    let text = raw.trim();

    // Extract phone: 10+ consecutive digits, or formatted (xxx) xxx-xxxx / xxx-xxx-xxxx
    const phoneRx = /(\(?\d{3}\)?[\s.\-]?\d{3}[\s.\-]?\d{4})/;
    const phoneMatch = text.match(phoneRx);
    const phone = phoneMatch ? phoneMatch[0].replace(/\D/g, '') : '';
    if (phoneMatch) text = text.replace(phoneMatch[0], ' ');

    // Extract amount: $150, 150.00, $1,500
    const amountRx = /\$?\s*([\d,]+(?:\.\d{1,2})?)\s*(?:dollars?)?/i;
    const amountMatch = text.match(amountRx);
    const amount = amountMatch ? parseFloat(amountMatch[1].replace(/,/g, '')) : null;
    if (amountMatch) text = text.replace(amountMatch[0], ' ');

    // Clean remaining text: strip punctuation used as separators
    const parts = text.split(/[.,\-|]+/).map(p => p.trim()).filter(Boolean);

    // Heuristic: shortest token = name (usually first name only), rest = service
    // But favour first chunk as name, second as service
    const name    = parts[0] || '';
    const service = parts.slice(1).join(', ') || '';

    return { name, phone, service, amount };
  }

  // ── State ────────────────────────────────────────────────────
  let parsed = {};

  // ── Step 1: Parse ─────────────────────────────────────────────
  document.getElementById('parseBtn').addEventListener('click', () => {
    const raw = document.getElementById('quickInput').value.trim();
    if (!raw) return showToast('Type something first.', true);

    parsed = parseInput(raw);

    if (!parsed.phone)  return showToast('Could not find a phone number.', true);
    if (!parsed.name)   return showToast('Could not find a customer name.', true);
    if (!parsed.amount || parsed.amount <= 0) return showToast('Could not find a dollar amount.', true);

    // Format phone for display
    const ph = parsed.phone;
    const displayPhone = ph.length === 10
      ? `(${ph.slice(0,3)}) ${ph.slice(3,6)}-${ph.slice(6)}`
      : ph;

    document.getElementById('c-name').textContent    = parsed.name;
    document.getElementById('c-phone').textContent   = displayPhone;
    document.getElementById('c-service').textContent = parsed.service || '—';
    document.getElementById('c-total').textContent   = formatMoney(parsed.amount);

    document.getElementById('inputStep').style.display   = 'none';
    document.getElementById('confirmStep').style.display = 'block';
  });

  // ── Step 1 also triggers on Enter ────────────────────────────
  document.getElementById('quickInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      document.getElementById('parseBtn').click();
    }
  });

  // ── Edit: go back ─────────────────────────────────────────────
  document.getElementById('editBtn').addEventListener('click', () => {
    document.getElementById('confirmStep').style.display = 'none';
    document.getElementById('inputStep').style.display   = 'block';
    document.getElementById('quickInput').focus();
  });

  // ── Step 2: Confirm & create ──────────────────────────────────
  document.getElementById('confirmBtn').addEventListener('click', async () => {
    const btn = document.getElementById('confirmBtn');
    btn.disabled    = true;
    btn.textContent = 'Sending…';

    try {
      const invoiceId = 'INV-' + Math.random().toString(36).slice(2, 10).toUpperCase();

      await atPost({
        invoice_id:       invoiceId,
        customer_name:    parsed.name,
        customer_contact: parsed.phone,
        vehicle:          '',
        services:         parsed.service,
        total_amount:     parsed.amount,
        shop_name:        shopName,
        status:           'pending',
        created_at:       new Date().toISOString(),
      });

      const link = `${location.origin}/customer?id=${encodeURIComponent(invoiceId)}`;
      navigator.clipboard.writeText(link).catch(() => {});
      showToast('Link copied — send it to ' + parsed.name + '!');

      // Reset back to input step
      document.getElementById('quickInput').value       = '';
      document.getElementById('confirmStep').style.display = 'none';
      document.getElementById('inputStep').style.display   = 'block';
      document.getElementById('quickInput').focus();
      parsed = {};

      await loadInvoices();
    } catch (err) {
      showToast(err.message || 'Something went wrong.', true);
    } finally {
      btn.disabled    = false;
      btn.textContent = 'Confirm & Send →';
    }
  });

  // ── Load & render invoices ──────────────────────────────────
  let allInvoices   = [];
  let currentFilter = 'all';

  async function loadInvoices() {
    try {
      const data = await atGet();
      allInvoices = data.invoices || [];
      renderInvoices();
    } catch (err) {
      showToast('Could not load invoices.', true);
    }
  }

  function renderInvoices() {
    const filtered = currentFilter === 'all'
      ? allInvoices
      : allInvoices.filter(inv => inv.status === currentFilter);

    document.getElementById('invoiceCount').textContent =
      `${filtered.length} invoice${filtered.length !== 1 ? 's' : ''}`;

    const list = document.getElementById('invoiceList');

    if (filtered.length === 0) {
      list.innerHTML = `<div class="empty-state"><div class="icon">📋</div>No ${currentFilter === 'all' ? '' : currentFilter + ' '}invoices yet.</div>`;
      return;
    }

    list.innerHTML = filtered.map(inv => {
      const date    = new Date(inv.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      const link    = `${location.origin}/customer?id=${encodeURIComponent(inv.invoice_id)}`;
      let svcLabel  = '';
      try { svcLabel = JSON.parse(inv.services).map(s => s.name).join(', '); } catch { svcLabel = inv.services || ''; }

      return `
        <div class="invoice-card ${escapeHtml(inv.status)}" onclick="openPanel('${escapeHtml(inv.invoice_id)}')">
          <div>
            <div class="inv-name">${escapeHtml(inv.customer_name)}</div>
            <div class="inv-desc">${inv.vehicle ? escapeHtml(inv.vehicle) + ' — ' : ''}${escapeHtml(svcLabel)}</div>
            <div class="inv-meta">
              <span class="inv-date">${escapeHtml(date)} · ${escapeHtml(inv.invoice_id)}</span>
              <span class="status-badge ${escapeHtml(inv.status)}">${escapeHtml(inv.status)}</span>
            </div>
          </div>
          <div class="inv-right">
            <span class="inv-amount">${formatMoney(inv.total_amount)}</span>
            <div class="inv-actions">
              <button class="copy-btn" onclick="event.stopPropagation(); copyLink('${link}',this)">Copy Link</button>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  // Filters
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      currentFilter = btn.dataset.filter;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderInvoices();
    });
  });

  // ── Detail panel ────────────────────────────────────────────
  window.openPanel = (invoiceId) => {
    const inv = allInvoices.find(i => i.invoice_id === invoiceId);
    if (!inv) return;

    document.getElementById('dp-id').textContent   = inv.invoice_id;
    document.getElementById('dp-name').textContent = inv.customer_name;

    let svcs = [];
    try { svcs = JSON.parse(inv.services); } catch {}

    const date = new Date(inv.created_at).toLocaleDateString('en-US', {
      weekday: 'long', month: 'long', day: 'numeric', year: 'numeric'
    });
    const link = `${location.origin}/customer?id=${encodeURIComponent(inv.invoice_id)}`;

    document.getElementById('dp-body').innerHTML = `
      <div>
        <div class="detail-section-label">Customer</div>
        <div class="detail-grid">
          <div class="detail-field">
            <span class="detail-field-label">Phone</span>
            <span class="detail-field-value">${escapeHtml(inv.customer_contact || '—')}</span>
          </div>
          <div class="detail-field">
            <span class="detail-field-label">Status</span>
            <span class="detail-field-value"><span class="status-badge ${escapeHtml(inv.status)}">${escapeHtml(inv.status)}</span></span>
          </div>
          <div class="detail-field" style="grid-column:1/-1">
            <span class="detail-field-label">Vehicle</span>
            <span class="detail-field-value">${escapeHtml(inv.vehicle || '—')}</span>
          </div>
          <div class="detail-field" style="grid-column:1/-1">
            <span class="detail-field-label">Date</span>
            <span class="detail-field-value">${escapeHtml(date)}</span>
          </div>
        </div>
      </div>
      <div>
        <div class="detail-section-label">Services</div>
        <div class="detail-services">
          ${svcs.map(s => `
            <div class="detail-svc-row">
              <span class="detail-svc-name">${escapeHtml(s.name)}</span>
              <span class="detail-svc-price">${formatMoney(s.price)}</span>
            </div>`).join('')}
        </div>
        <div class="detail-total">
          <span class="detail-total-label">Total</span>
          <span class="detail-total-amount">${formatMoney(inv.total_amount)}</span>
        </div>
      </div>
      ${inv.notes ? `
      <div>
        <div class="detail-section-label">Notes</div>
        <div class="detail-notes">${escapeHtml(inv.notes)}</div>
      </div>` : ''}
      <div class="detail-actions">
        <button class="action-btn primary" onclick="copyLink('${link}', this)">Copy Payment Link</button>
        <button class="action-btn" onclick="closePanel()">Close</button>
      </div>`;

    document.getElementById('overlay').classList.add('open');
    document.getElementById('detailPanel').classList.add('open');
    document.body.style.overflow = 'hidden';
  };

  function closePanel() {
    document.getElementById('overlay').classList.remove('open');
    document.getElementById('detailPanel').classList.remove('open');
    document.body.style.overflow = '';
  }

  document.getElementById('closeBtn').addEventListener('click', closePanel);
  document.getElementById('overlay').addEventListener('click', closePanel);
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });

  window.copyLink = (link, btn) => {
    navigator.clipboard.writeText(link).then(() => {
      const orig = btn.textContent;
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 2000);
    });
  };

  // ── Init ─────────────────────────────────────────────────────
  loadInvoices();
  // Poll for updates every 30 seconds (replaces Supabase real-time)
  setInterval(loadInvoices, 30000);
</script>
</body>
